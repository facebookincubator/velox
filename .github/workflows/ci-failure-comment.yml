name: CI Failure Comment

# This workflow runs in the context of the base repo (not the fork) and has
# write access to post PR comments. It is triggered when the Linux Build
# workflow completes and uses Claude to analyze failure logs, correlate with
# the PR diff and open issues, and post a rich diagnostic comment.
#
# Security: This workflow never checks out or executes PR code. It reads
# failure metadata from artifacts uploaded by our own status jobs, then uses
# Claude with read-only gh CLI access to fetch logs and produce comments.
#
# zizmor:disable:dangerous-triggers -- only reads artifacts and posts comments, no PR code execution.
on:
  workflow_run:
    workflows: [Linux Build using GCC]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  analyze-and-comment:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr_number=$(gh api \
            "/repos/${REPO}/pulls?head=${HEAD_OWNER}:${HEAD_BRANCH}&state=open" \
            -q '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            echo "No open PR found for branch ${HEAD_BRANCH}"
            exit 0
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Download failure artifacts
        if: steps.pr.outputs.number
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: ci-failure-*
          path: /tmp/ci-failures
          merge-multiple: false

      - name: Collect failure metadata
        if: steps.pr.outputs.number
        id: metadata
        run: |
          FAILURES_DIR="/tmp/ci-failures"
          if [ ! -d "$FAILURES_DIR" ] || [ -z "$(ls -A "$FAILURES_DIR" 2>/dev/null)" ]; then
            echo "No failure artifacts found."
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Collect all failure.json contents into a single JSON array.
          METADATA="["
          FIRST=true
          for entry in "$FAILURES_DIR"/ci-failure-*/failure.json; do
            if [ -f "$entry" ]; then
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                METADATA="$METADATA,"
              fi
              METADATA="$METADATA$(cat "$entry")"
            fi
          done
          METADATA="$METADATA]"

          echo "has_failures=true" >> "$GITHUB_OUTPUT"
          {
            echo 'failure_metadata<<EOF'
            echo "$METADATA"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Checkout for Claude CLAUDE.md
        if: steps.metadata.outputs.has_failures == 'true'
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: |
            CLAUDE.md
            .claude/CLAUDE.md
          persist-credentials: false

      - name: Analyze failures with Claude
        if: steps.metadata.outputs.has_failures == 'true'
        uses: izaitsevfb/claude-code-action@ececd56fb999d06b4dd2477437bc408938295d76 # forked-pr-fix
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-sonnet-4-6 --allowedTools "Bash(gh:*)" Read Grep Glob
          prompt: |
            You are a CI failure analyst for the Velox C++ project. A CI run has failed
            on PR #${{ steps.pr.outputs.number }} in the ${{ github.repository }} repo.
            The workflow run ID is ${{ github.event.workflow_run.id }}.

            Failure metadata (JSON array of failed jobs):
            ${{ steps.metadata.outputs.failure_metadata }}

            Each entry has: "job" (job name), "type" ("build" or "test"), and
            optionally "failed_tests" (newline-separated test names).

            Your task:
            1. Use `gh api` to download the logs for the failed jobs in this workflow run.
               - List jobs: `gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs`
               - Download job logs: `gh api repos/${{ github.repository }}/actions/jobs/{job_id}/logs` (returns plain text)
               - If job logs API fails, try: `gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed`

            2. For TEST failures: Find the gtest failure output — the lines between `[ RUN      ]` and
               `[  FAILED  ]` for each failing test. Extract the assertion message, expected vs actual
               values, file path, and line number.

            3. For BUILD failures: Find compiler `error:` lines with file paths and error messages.

            4. Get the PR diff: `gh pr diff ${{ steps.pr.outputs.number }} --repo ${{ github.repository }}`
               Determine if the failures are likely caused by the PR changes.

            5. Search open issues for known failures:
               `gh issue list --repo ${{ github.repository }} --search "<test_name>" --state open --limit 5`
               Check if any failing test has a known open issue.

            6. Check if the same tests fail on the main branch (pre-existing flaky test):
               `gh run list --repo ${{ github.repository }} --branch main --workflow "Linux Build using GCC" --limit 3 --json conclusion,databaseId`
               If recent main runs also failed, note this.

            7. Post a SINGLE comment on the PR with your analysis using:
               `gh pr comment ${{ steps.pr.outputs.number }} --repo ${{ github.repository }} --body "<comment>"`

            Format the comment as follows (use markdown):
            ```
            ## CI Failure Analysis

            ### <STATUS_EMOJI> <Job Name> — <BUILD|TEST> Failure

            **Failed tests:** (or **Build errors:** for build failures)

            For each failing test, show:
            - Test name
            - The assertion error (expected vs actual, or the error message)
            - Source file and line number

            For build failures, show:
            - The compiler error message
            - Source file and line number

            Keep failure details in a code block for readability.

            **Correlation with PR changes:**
            - State whether the failure appears related to the PR diff or not
            - If related, point to the specific file/function in the diff that likely caused it
            - If unrelated, explain why (e.g., "This test modifies X but the PR only touches Y")

            **Known issues:**
            - If an open issue tracks this failure, link to it
            - If the same test fails on main, note it as a pre-existing/flaky failure

            **Recommended fix:** (if the failure is related to the PR)
            - Brief suggestion of what to fix

            [View full CI logs](<link to the workflow run>)
            ```

            Important rules:
            - Be concise. Show only the relevant failure output, not the entire log.
            - If many tests fail (>5), show the first 3-5 in detail and summarize the rest.
            - Cap the comment at 60,000 characters (GitHub limit is 65,536).
            - Use the `gh pr comment` command to post. Do NOT use any other method.
            - If you cannot determine the cause, say so honestly rather than guessing.
        env:
          GH_TOKEN: ${{ github.token }}
