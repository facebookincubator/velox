# Claude Assistant for PRs
#
# Supported Commands (comment on a PR):
# - @claude /pr-review [additional context] : Perform a thorough code review
# - @claude /pr-query <question> : Ask Claude a question about the PR or codebase
#
# Security Model:
# - Only authorized users can trigger Claude (hardcoded allowlist)
# - Uses izaitsevfb/claude-code-action fork which handles forked PRs securely
# - Claude uses read-only tools via Skills (no Bash, no file writes)

name: Claude Assistant

on:
  issue_comment:
    types: [created]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number
      model:
        description: Claude model to use
        required: false
        type: choice
        options:
          - claude-opus-4-6
          - claude-opus-4-1-20250805
          - claude-sonnet-4-20250514
          - claude-4-0-sonnet-20250805
        default: claude-opus-4-6

# Restrict default permissions
permissions:
  contents: read

jobs:
  claude-assistant:
    name: Claude Assistant
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["kgpai", "mbasmanova", "pedroerp", "yuhta", "kagamiori", "bikramSingh91", "kevinwilfong", "xiaoxmeng", "kKPulla", "juwentus1234", "penescu", "srsuryadev", "jainxrohit", "pratikpugalia"]'), github.event.comment.user.login)
      )

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/merge', inputs.pr_number) || '' }}
          persist-credentials: false

      - name: Run Claude Code
        uses: izaitsevfb/claude-code-action@2817c54db8f44f3a0485d57292566bf07d428a25 # forked-pr-fix
        with:
          trigger_phrase: "@claude"
          prompt: ${{ github.event_name == 'workflow_dispatch' && format('Review the PR currently checked out in the Velox project current workspace. Use the /pr-review skill and post the final output as a comment on the original PR {0}', inputs.pr_number) || '' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model ${{ github.event_name == 'workflow_dispatch' && inputs.model || 'claude-opus-4-6' }} --allowedTools Skill,${{ github.event_name == 'workflow_dispatch' && 'mcp__github_comment__create_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)' || '' }}Read,Glob,Grep"
          settings: '{"alwaysThinkingEnabled": true}'

  # Notify unauthorized users
  unauthorized-notice:
    name: Unauthorized Notice
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      !contains(fromJSON('["kgpai", "mbasmanova", "pedroerp", "yuhta", "kagamiori", "bikramSingh91", "kevinwilfong", "xiaoxmeng", "kKPulla", "juwentus1234", "penescu", "srsuryadev", "jainxrohit", "pratikpugalia"]'), github.event.comment.user.login)

    steps:
      - name: Post unauthorized notice
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `👋 @${context.payload.comment.user.login}, \`@claude\` commands are currently restricted to a small group of users during this initial rollout.\n\nIf you'd like a Claude review, please ask a maintainer to run this command.`
            });
