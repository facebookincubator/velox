# Generates and uploads the dependency-graph artifact for every push to main.
# The artifact (`dependency-graph`) is consumed by the selective-build-plan
# reusable workflow (called from linux-build.yml) to compute
# targeted-build target lists for PRs.
#
# PR-side detection (fast / slow / full / noop) lives in
# selective-build-plan.yml, not here.
name: Dependency Graph

on:
  push:
    branches:
      - main
    paths:
      - velox/**
      - CMakeLists.txt
      - CMake/**
      - .github/workflows/dependency-graph.yml
      - .github/scripts/generate-dependency-graph.py
      - .github/actions/generate-dependency-graph/action.yml
      - .github/scripts/cmake-flags.sh

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  generate-graph:
    runs-on: 8-core-ubuntu
    container: ghcr.io/facebookincubator/velox-dev:adapters
    env:
      VELOX_DEPENDENCY_SOURCE: SYSTEM
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/generate-dependency-graph

      - name: Upload dependency graph
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dependency-graph
          path: dependency-graph.json
          retention-days: 90
