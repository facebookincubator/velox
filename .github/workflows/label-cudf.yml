name: Auto Label CUDF PRs

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: write

jobs:
  label-cudf:
    name: Add cudf label
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title and add label
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            
            // Check if title contains (cudf) - case insensitive
            if (title.toLowerCase().includes('(cudf)')) {
              console.log(`PR title contains (cudf): "${title}"`);
              
              // Get current labels
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              
              // Check if cudf label already exists
              const hasCudfLabel = currentLabels.some(label => label.name === 'cudf');
              
              if (!hasCudfLabel) {
                console.log('Adding cudf label...');
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['cudf']
                });
                console.log('cudf label added successfully');
              } else {
                console.log('cudf label already exists');
              }
            } else {
              console.log(`PR title does not contain (cudf): "${title}"`);
            }

