# Step 1 of the auto-trigger-full-build chain for approving reviews.
#
# Fires on `pull_request_review:[submitted]`, gated to
# `state == 'approved'`. On a fork PR, this event runs in fork-PR
# context (the YAML loaded here is from the PR head ref,
# attacker-controllable) with a read-only GITHUB_TOKEN, so the
# privileged work — finding the in-flight Linux Build run and
# cancelling + re-running it — must happen in the chained
# rerun-on-force-full.yml (workflow_run, BASE context, full token).
#
# This workflow exists solely to fire `workflow_run`. Keep it
# trivial: no env binding of PR fields, no artifact upload, no jq —
# anything beyond a no-op echo would be a forgery surface, since the
# chained workflow re-derives PR identity from `workflow_run.id` and
# ignores anything we could put in an artifact.
#
# /full-build comment escalation does NOT come through here — see
# force-full-on-comment.yml. issue_comment events run with a full
# GITHUB_TOKEN even when the comment author is from a fork (the
# fork-PR token restriction targets pull_request* events only), so
# the comment path can do its rerun inline without the workflow_run
# hop.

name: Detect Force-Full Trigger

# zizmor:disable:dangerous-triggers -- pull_request_review fires in
# fork-PR context, but no PR-controlled code is executed and the
# only secret-touching action runs in the chained workflow.

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  detect:
    # Restrict to committer approvals (users with push access to the
    # repo) to cap CI-minutes exposure from drive-by approvals on
    # fork PRs. rerun-on-force-full re-derives the upstream event
    # from workflow_run.id and applies the same filter to its dedup
    # count so non-committer approvals on the same SHA don't bump
    # the counter and dedup away a committer's first approval.
    if: >
      github.event.review.state == 'approved' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.review.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger (no PR-controlled output)
        run: |
          echo "force-full trigger: pull_request_review approved"
          echo "PR #${{ github.event.pull_request.number }}"
          echo "head sha: ${{ github.event.pull_request.head.sha }}"
          echo "(rerun-on-force-full re-derives both via workflow_run.id)"
