# Windows / MSVC smoke build scaffold. Manual-only to avoid adding a required or per-PR platform gate. This intentionally disables optional feature modules until their Windows/MSVC support lands in separate PRs.
name: Windows Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  windows-build:
    name: windows-2022-${{ matrix.type }}
    strategy:
      fail-fast: false
      matrix:
        type: [release]
    runs-on: windows-2022
    env:
      # vcpkg binary caching via GitHub Actions cache: deps build once, then restore.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Required for the vcpkg "x-gha" binary cache backend.
      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Provides FlexLexer.h (included by the pre-generated scanners). The parsers
      # themselves are committed pre-generated, so bison/flex are not run.
      - name: Install WinFlexBison
        shell: pwsh
        run: |
          choco install winflexbison3 --no-progress -y
          $h = Get-ChildItem "$env:ChocolateyInstall\lib\winflexbison3" -Recurse -Filter FlexLexer.h -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($h) {
            "FLEX_INCLUDE_DIRS=$($h.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            $h.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B _build/release -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DVCPKG_OVERLAY_TRIPLETS="$PWD/windows/oss-triplets" `
            -DVCPKG_MANIFEST_DIR="$PWD/windows/vcpkg" `
            -DCMAKE_CXX_STANDARD=20 `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL `
            -DFLEX_INCLUDE_DIRS="$env:FLEX_INCLUDE_DIRS" `
            -DCMAKE_DISABLE_FIND_PACKAGE_BISON=ON -DCMAKE_DISABLE_FIND_PACKAGE_FLEX=ON `
            -DVELOX_BUILD_STATIC=ON -DVELOX_BUILD_SHARED=OFF -DVELOX_MONO_LIBRARY=OFF `
            -DVELOX_BUILD_TESTING=OFF -DVELOX_BUILD_RUNNER=OFF `
            -DVELOX_ENABLE_BENCHMARKS=OFF -DVELOX_ENABLE_EXAMPLES=OFF `
            -DVELOX_ENABLE_S3=OFF -DVELOX_ENABLE_GCS=OFF -DVELOX_ENABLE_HDFS=OFF -DVELOX_ENABLE_ABFS=OFF `
            -DVELOX_ENABLE_GEO=OFF -DVELOX_ENABLE_HIVE_CONNECTOR=OFF `
            -DVELOX_ENABLE_PARQUET=OFF -DVELOX_ENABLE_TPCH_CONNECTOR=OFF -DVELOX_ENABLE_TPCDS_CONNECTOR=OFF `
            -DVELOX_ENABLE_ARROW=OFF -DVELOX_ENABLE_PRESTO_FUNCTIONS=OFF `
            -DVELOX_ENABLE_SPARK_FUNCTIONS=OFF -DVELOX_ENABLE_ICEBERG_FUNCTIONS=OFF `
            -DVELOX_ENABLE_EXEC=OFF -DVELOX_ENABLE_EXPRESSION=OFF `
            -DVELOX_ENABLE_DUCKDB=OFF -DVELOX_ENABLE_PARSE=OFF

      - name: Build
        shell: pwsh
        run: cmake --build _build/release --config Release -- /m