# Tests the BUNDLED dependency resolution path on a plain Ubuntu runner
# (no container). Triggered on PRs that change dependency scripts or
# CMake modules, and on a nightly schedule.

name: Ubuntu Bundled Dependencies

on:
  schedule:
    - cron: 0 5 * * *
  workflow_dispatch: {}
  pull_request:
    paths:
      - scripts/setup-*.sh
      - scripts/setup-common.sh
      - scripts/setup-versions.sh
      - scripts/setup-helper-functions.sh
      - CMake/**
      - CMakeLists.txt
      - .github/workflows/ubuntu-bundled-deps.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  ubuntu-debug-bundled-deps:
    runs-on: 16-core-ubuntu
    if: ${{ github.repository == 'facebookincubator/velox' }}
    name: Ubuntu debug with bundled dependencies
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
    defaults:
      run:
        shell: bash
        working-directory: velox
    steps:

      - name: Get Ccache Stash
        uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-debug-bundled-deps

      - name: Ensure Stash Dirs Exists
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$CCACHE_DIR"

      - uses: actions/checkout@v5
        with:
          path: velox
          persist-credentials: false

      - name: Install Dependencies
        run: |
          source scripts/setup-ubuntu.sh
          install_apt_deps
          install_faiss_deps
          # Install FBOS deps due to patching fbthrift.
          # Remove when upgrading FBOS to 20250511 or later.
          install_fmt
          install_boost
          install_fast_float
          install_folly
          install_fizz
          install_wangle
          install_mvfst
          install_fbthrift

      - name: Clear CCache Statistics
        run: |
          ccache -sz

      - name: Make Debug Build
        env:
          VELOX_DEPENDENCY_SOURCE: BUNDLED
          # Boost and Gflags are referenced by the previous re-install as coming
          # from the system and when using the bundle the bundled build doesn't match.
          # E.g. gflags is referecned as shared but the bundled build generates
          # the static version (VELOX_BUILD_SHARED=OFF) leading to failures finding the library.
          Boost_SOURCE: SYSTEM
          gflags_SOURCE: SYSTEM
          ICU_SOURCE: SYSTEM
          MAKEFLAGS: NUM_THREADS=16 MAX_HIGH_MEM_JOBS=4 MAX_LINK_JOBS=2
        run: |
          BUILD_PROFILE=ubuntu-bundled-deps source .github/scripts/cmake-flags.sh
          export EXTRA_CMAKE_FLAGS="${CMAKE_FLAGS[*]}"
          make debug

      - name: CCache after
        run: |
          ccache -vs

      - uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-debug-bundled-deps

      - name: Run Tests
        run: |
          cd _build/debug && ctest -j 8 --output-on-failure --no-tests=error
