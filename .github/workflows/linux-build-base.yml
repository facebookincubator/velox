name: Linux Build

on:
  workflow_call:
    inputs:
      use-clang:
        description: Use Clang to compile the project.
        default: false
        required: false
        type: boolean
      is-full-mode:
        description: >
          When true, run the full set of build jobs (adapters, ubuntu-debug,
          fedora-debug, cudf-tests). When false, only adpaters job runs and
          uses cmake-targets to do a selective build.
          Default true preserves prior behavior for callers that do not opt
          into selective builds.
        default: true
        required: false
        type: boolean
      cmake-targets:
        description: >
          Space-separated cmake target list for the adapters job's selective
          build. Empty = full build, non-empty = selective
          (builds only the listed targets).
        default: ''
        required: false
        type: string

jobs:

  get-changes:
    # Always runs — clang-tidy in the adapters job needs the changed-files
    # list and diff range in both selective and full modes.
    runs-on: ubuntu-latest
    outputs:
      run-clang-tidy: ${{ steps.changes.outputs.run_clang_tidy }}
      changed-files: ${{ steps.changes.outputs.files}}
      diff-range: ${{ steps.changes.outputs.range }}
      merge-base-commit: ${{ steps.changes.outputs.merge_base_commit }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Get changed files
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_OWNER: ${{ github.event.pull_request.head.repo.owner.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          JOB_TRIGGER: ${{ github.event_name }}
        run: |
          echo "JOB_TRIGGER: $JOB_TRIGGER"
          if [[ "$JOB_TRIGGER" == "pull_request" ]]; then
            source .github/scripts/gh-api-retry.sh
            merge_base_commit=$(gh_api -q '.merge_base_commit.sha' \
              /repos/facebookincubator/velox/compare/facebookincubator:$BASE_REF...$PR_OWNER:$HEAD_REF \
            )

            range="$merge_base_commit..$HEAD_SHA"
            echo "range=$range" >> "$GITHUB_OUTPUT"
            echo "merge_base_commit=$merge_base_commit" >> "$GITHUB_OUTPUT"

            git diff --name-only $range > changed_files.txt

            cpp_files='.+\.(cpp|h|hpp)$'

            {
              echo 'files<<EOF'
              cat changed_files.txt
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"

            if grep -qE $cpp_files changed_files.txt; then
              echo "run_clang_tidy=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run_clang_tidy=false" >> "$GITHUB_OUTPUT"
          fi

  adapters:
    name: Linux release with adapters
    needs: get-changes
    # Always runs — this is the selective-build consumer pre-approval
    # (cmake-targets non-empty -> targeted) and the full coverage post-
    # approval / on push (cmake-targets empty -> full build). The repo
    # check prevents errors when forks fast-forward their main branch.
    if: ${{ github.repository == 'facebookincubator/velox' }}
    runs-on: 32-core-ubuntu
    container: ghcr.io/czentgr/czentgr-test:thrift-deps
    defaults:
      run:
        shell: bash
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      VELOX_DEPENDENCY_SOURCE: SYSTEM
      cudf_SOURCE: BUNDLED
      CUDA_VERSION: '12.9'
      faiss_SOURCE: BUNDLED
      USE_CLANG: "${{ inputs.use-clang && 'true' || 'false' }}"
      # Empty when full mode (or when the plan emitted no targets);
      # space-separated cmake target names when running selective.
      BUILD_TARGETS: ${{ inputs.cmake-targets }}
    outputs:
      cudf-changes: ${{ steps.changes.outputs.cudf }}
      build-outcome: ${{ steps.build.outcome }}
      build-failure-details: ${{ steps.build-errors.outputs.build-failure-details }}
      test-outcome: ${{ steps.retry-tests.outcome != 'skipped' && steps.retry-tests.outcome || steps.tests.outcome }}
      flaky: ${{ steps.retry-tests.outputs.flaky }}
      failed-tests: ${{ steps.retry-tests.outputs.failed-tests }}
      failed-cases: ${{ steps.retry-tests.outputs.failed-cases }}
      failure-details: ${{ steps.retry-tests.outputs.failure-details }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Fix git permissions
        # Usually actions/checkout does this but as we run in a container
        # it doesn't work
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Install Dependencies
        env:
          VELOX_BUILD_SHARED: "ON"
        run: |
          if git diff --name-only HEAD^1 HEAD | grep -q "scripts/setup-"; then
            echo "Removing previous AWS SDK and s2n installations to avoid conflicts..."
            rm -rf /usr/local/include/s2n /usr/local/lib64/s2n
            rm -rf /usr/local/include/aws
            # Overwrite old setup scripts with changed versions
            cp scripts/setup-* /

            mkdir /tmp/build
            cd /tmp/build
            source /opt/rh/gcc-toolset-12/enable
            bash /setup-centos-adapters.sh configure_dnf_for_cuda
            export VELOX_ARROW_CMAKE_PATCH="${GITHUB_WORKSPACE}/CMake/resolve_dependency_modules/arrow/arrow-testing-boost.patch ${GITHUB_WORKSPACE}/CMake/resolve_dependency_modules/arrow/cmake-compatibility.patch"
            # Install basic deps with GCC. Some deps have problems (e.g. folly missing atomic lib).
            USE_CLANG=false bash /setup-centos9.sh

            bash /setup-centos-adapters.sh

            cd /
            rm -rf /tmp/build # cleanup to avoid issues with disk space
          fi

      - uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-adapters-${{ inputs.use-clang && 'clang' || 'gcc' }}

      - name: Zero Ccache Statistics
        run: |
          ccache -sz

      - name: Make Release Build
        id: build
        env:
          MAKEFLAGS: NUM_THREADS=32 MAX_HIGH_MEM_JOBS=12 MAX_LINK_JOBS=12
          CUDA_ARCHITECTURES: 70
          CUDA_COMPILER: /usr/local/cuda-${CUDA_VERSION}/bin/nvcc
          # Set compiler to GCC 14
          CUDA_FLAGS: -ccbin /opt/rh/gcc-toolset-14/root/usr/bin
        run: |
          # Same cmake configure runs in both selective and full mode —
          # the only difference is the TARGETS env var (empty = full
          # build, non-empty = `cmake --build --target …`). Identical
          # flags mean ccache hits transfer between modes, so the
          # post-approval re-run is largely incremental on top of the
          # pre-approval selective build. MONO_LIBRARY=OFF is required
          # for selective to actually skip work — with MONO=ON every
          # leaf target depends on libvelox.so which would re-link
          # everything.
          # All adapters cmake flags (including compiler-conditional
          # ones) live in .github/scripts/cmake-flags.sh — keep in
          # sync with the dep-graph generator (BUILD_PROFILE=dep-graph
          # there, which mirrors adapters minus the experimental gates)
          # by editing the script, not this list.
          BUILD_PROFILE=adapters USE_CLANG="${USE_CLANG}" source .github/scripts/cmake-flags.sh
          EXTRA_CMAKE_FLAGS=("${CMAKE_FLAGS[@]}")
          if [[ "${USE_CLANG}" = "true" ]]; then
             scripts/setup-centos9.sh install_clang15; export CC=/usr/bin/clang-15; export CXX=/usr/bin/clang++-15; CUDA_FLAGS="-ccbin /usr/lib64/llvm15/bin/clang++-15";
          fi
          source /opt/rh/gcc-toolset-14/enable
          g++ --version
          # CC/CXX are set to GCC12 in the adapters image build and it needs to be overridden
          # after sourcing GCC14.
          # Empty TARGETS = full build (push, approved review, sticky).
          # Non-empty = selective build of the requested targets.
          CC=gcc CXX=g++ make release \
            EXTRA_CMAKE_FLAGS="${EXTRA_CMAKE_FLAGS[*]}" \
            TARGETS="$BUILD_TARGETS" \
            2>&1 | tee /tmp/build-output.log

      - name: Extract build errors
        id: build-errors
        if: failure() && steps.build.outcome == 'failure'
        run: |
          # Strip ANSI escape sequences before grepping — the build uses
          # -fdiagnostics-color=always which embeds SGR and erase (ESC[K)
          # codes that prevent matching literal ': error:'.
          BUILD_ERRORS=$(sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/build-output.log | grep -E ' (error|fatal error):' | head -50 || true)
          if [[ -n $BUILD_ERRORS ]]; then
            {
              echo 'build-failure-details<<EOF'
              echo "$BUILD_ERRORS"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Ccache after
        run: ccache -s

      - uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-adapters-${{ inputs.use-clang && 'clang' || 'gcc' }}

      - name: Run Tests
        id: tests
        continue-on-error: true
        if: steps.build.outcome == 'success'
        env:
          LIBHDFS3_CONF: ${{ github.workspace }}/scripts/ci/hdfs-client.xml
        working-directory: _build/release
        run: |
          source /setup-classpath.sh
          ulimit -n 65536
          # Selective mode: BUILD_TARGETS is the list of cmake targets we
          # actually built. ctest by default runs every registered test in
          # the build dir, including 500+ whose binaries don't exist in
          # selective — they'd all report "Unable to find executable" and
          # fail the step. Restrict ctest to the targets we built (anchored
          # exact-name regex) and drop --no-tests=error so a build whose
          # targets are libraries-only (no test executables) doesn't fail
          # the job. Full mode keeps the original behavior unchanged.
          CTEST_FILTER=()
          if [[ -n "$BUILD_TARGETS" ]]; then
            regex_targets="$(
              printf '%s\n' $BUILD_TARGETS |
                sed -e 's/[][(){}.^$*+?|\\]/\\&/g' |
                paste -sd '|' -
            )"
            CTEST_FILTER=(-R "^(${regex_targets})$")
          else
            CTEST_FILTER=(--no-tests=error)
          fi
          ctest -j 24 --timeout 900 --label-exclude cuda_driver \
            "${CTEST_FILTER[@]}" \
            --output-on-failure \
            --output-junit test-results.xml 2>&1 | tee /tmp/ctest-output.log

      - name: Retry Flaky Tests
        id: retry-tests
        continue-on-error: true
        if: steps.tests.outcome == 'failure'
        env:
          LIBHDFS3_CONF: ${{ github.workspace }}/scripts/ci/hdfs-client.xml
        working-directory: _build/release
        run: |
          source /setup-classpath.sh
          echo "::warning::Some tests failed. Retrying failed tests..."
          if ctest --rerun-failed -j 4 --timeout 900 \
               --output-on-failure --output-junit retry-results.xml; then
            echo "::warning::All failed tests passed on retry — these are flaky tests."
            echo "flaky=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Tests failed consistently on retry."
            "$GITHUB_WORKSPACE/.github/scripts/extract-test-failures.sh" /tmp/ctest-output.log
            exit 1
          fi

      # Clang-tidy needs a complete build because some files are only generated during the build
      # that clang tidy will not find and report errors otherwise.
      # When clang is used a number of dependencies are excluded from the build so we don't
      # need to run clang-tidy for that.
      # Let's also run this as last step so that if skipped it doesn't affect subsequent steps.
      - name: Install and run clang-tidy
        if: ${{ steps.build.outcome == 'success' && ! inputs.use-clang && needs.get-changes.outputs.run-clang-tidy == 'true' }}
        env:
          FILES: ${{ needs.get-changes.outputs.changed-files }}
          RANGE: ${{ needs.get-changes.outputs.diff-range }}
          MERGE_BASE_COMMIT: ${{ needs.get-changes.outputs.merge-base-commit }}
        run: |
          git config --global --add safe.directory /__w/velox/velox
          uv tool install clang-tidy==18.1.8
          git fetch origin $MERGE_BASE_COMMIT
          # The usage of GCC14 adds compiler warnings not understood by Clang/Clang-tidy.
          # We replace them for now but eventually move Clang-tidy to the Clang based build.
          BUILD_PATH=$(realpath ./_build/release)
          sed -i 's/-Wno-error=template-id-cdtor//g' $BUILD_PATH/compile_commands.json
          sed -i 's/-Wno-class-memaccess//g' $BUILD_PATH/compile_commands.json
          sed -i 's/-Wno-maybe-uninitialized//g' $BUILD_PATH/compile_commands.json
          sed -i 's/-fcoroutines//g' $BUILD_PATH/compile_commands.json
          python ./scripts/checks/run-clang-tidy.py -p $BUILD_PATH --commit $RANGE $FILES

      - name: Check cuDF Changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        # Skip in selective mode — the cuDF test binaries this and the
        # following steps prepare are only consumed by the cudf-tests
        # job, which itself is gated on is-full-mode.
        if: ${{ inputs.is-full-mode && ! inputs.use-clang && always() }}
        with:
          filters: |
            cudf:
              - 'velox/experimental/cudf/**'
              - 'CMake/resolve_dependency_modules/cudf.cmake'

      - name: Copy Shared Libraries for cuDF Test Binaries
        if: ${{ inputs.is-full-mode && ! inputs.use-clang && steps.changes.outputs.cudf && always() }}
        env:
          CUDF_DIR: _build/release/velox/experimental/cudf
        run: |
          mkdir -p "$CUDF_DIR/cudf-libs"
          deps=$(
            find "$CUDF_DIR/tests" -name "velox_cudf_*" -type f -executable |
            xargs ldd 2>/dev/null |
            sed -n 's/[^\/]*\(\/[^ ]*\) .*/\1/p' |
            grep -vE '^/(lib|usr/lib|lib64)/(libcuda|librt\.so|libm\.so|libstdc\+\+\.so|ld-linux-x86-64\.so|libc\.so)' |
            sort -u
          )
          if [ -z "$deps" ]; then
            echo "Error: No dependencies found"
            exit 1
          fi
          # copy all "real" files and symlink targets to "$CUDF_DIR/cudf-libs"
          (
            echo "$deps" |
            xargs readlink -f |
            xargs -I {} cp {} "$CUDF_DIR/cudf-libs/"
          )
          # filter out which libraries are symlinks
          lndeps=$(echo "$deps" | xargs -I {} bash -c '[ -L "$1" ] && echo "$1" || true' bash {})
          # write new symlinks to the same folder, with targets in the same folder
          (
            if [[ -d "$CUDF_DIR/cudf-libs" ]]; then
              cd "$CUDF_DIR/cudf-libs" || exit 1
              while IFS= read -r link; do
                [[ -L "$link" ]] || continue
                target=$(readlink -f "$link") || continue
                target_basename=$(basename "$target") || continue
                link_basename=$(basename "$link") || continue
                ln -sf "$target_basename" "$link_basename" || echo "Warning: Failed to create symlink $link_basename"
              done <<< "$lndeps"
            else
              echo "Error: Directory $CUDF_DIR/cudf-libs not found"
              exit 1
            fi
          )
          tar -cvf "$CUDF_DIR/cudf-libs.tar" -C "$CUDF_DIR" cudf-libs

      - name: Upload cuDF Test Binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ inputs.is-full-mode && ! inputs.use-clang && steps.changes.outputs.cudf && always() }}
        with:
          name: cudftestbinaries
          path: |
            velox/dwio/parquet/tests/examples/int.parquet
            velox/experimental/cudf/tests/**/CMakeLists.txt
            _build/release/velox/experimental/cudf/tests/velox_cudf_*
            _build/release/velox/experimental/cudf/tests/**/CTestTestfile.cmake
            _build/release/velox/experimental/cudf/cudf-libs.tar
          retention-days: ${{ env.RETENTION }}

  adapters-build-status:
    if: always()
    needs: adapters
    runs-on: ubuntu-latest
    name: "BUILD: Linux release with adapters"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Report build status
        run: .github/scripts/report-build-status.sh "Linux release with adapters"
        env:
          BUILD_OUTCOME: ${{ needs.adapters.outputs.build-outcome }}
          BUILD_FAILURE_DETAILS: ${{ needs.adapters.outputs.build-failure-details }}

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-adapters-build
          path: /tmp/ci-failure/failure.json
          retention-days: 1
          if-no-files-found: ignore

  adapters-test-status:
    if: always()
    needs: adapters
    runs-on: ubuntu-latest
    name: "TEST: Linux release with adapters"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Report test status
        run: .github/scripts/report-test-status.sh "Linux release with adapters" "Linux adapters release"
        env:
          BUILD_OUTCOME: ${{ needs.adapters.outputs.build-outcome }}
          TEST_OUTCOME: ${{ needs.adapters.outputs.test-outcome }}
          FLAKY: ${{ needs.adapters.outputs.flaky }}
          FAILED_TESTS: ${{ needs.adapters.outputs.failed-tests }}
          FAILED_CASES: ${{ needs.adapters.outputs.failed-cases }}
          FAILURE_DETAILS: ${{ needs.adapters.outputs.failure-details }}

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-adapters-test
          path: /tmp/ci-failure/failure.json
          retention-days: 1
          if-no-files-found: ignore

  cudf-tests:
    runs-on: 4-core-ubuntu-gpu-t4
    needs: adapters
    if: ${{ inputs.is-full-mode && ! inputs.use-clang && needs.adapters.outputs.cudf-changes == 'true' && needs.adapters.result == 'success' && always() }}
    timeout-minutes: 30
    env:
      CUDF_DIR: _build/release/velox/experimental/cudf
    steps:
      - name: Install Packages
        run: |
          sudo apt-get update && sudo apt-get install -y cmake patchelf cuda-toolkit-12-9
          export MINIO_VERSION="2022-05-26T05-48-41Z"
          export MINIO_BINARY_NAME="minio-2022-05-26"
          wget https://dl.min.io/server/minio/release/linux-amd64/archive/minio.RELEASE."${MINIO_VERSION}" -O "${MINIO_BINARY_NAME}"
          sudo mv ./"${MINIO_BINARY_NAME}" /usr/local/bin/
          sudo chmod +x /usr/local/bin/"${MINIO_BINARY_NAME}"
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          . "$HOME/.nvm/nvm.sh" && nvm install 22
          . "$HOME/.nvm/nvm.sh" && npm install -g azurite && \
            sudo ln -sf "$(dirname "$(which node)")"/* /usr/local/bin/
          azurite-blob --version

      - name: Check NVIDIA Driver Version
        run: |
          nvidia-smi

      - name: Download cuDF Test Binaries
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: cudftestbinaries

      - name: Adapt Downloaded Files
        run: |
          # Change hardcoded workspace path in every CTestTestfile.cmake to
          # the runner workspace.
          mapfile -t ctest_files < <(find "$CUDF_DIR/tests" -name CTestTestfile.cmake)
          if [[ ${#ctest_files[@]} -eq 0 ]]; then
            echo "Error: no CTestTestfile.cmake files found under $CUDF_DIR/tests"
            exit 1
          fi
          for f in "${ctest_files[@]}"; do
            sed -i "s|/__w/velox/velox|${GITHUB_WORKSPACE}|g" "$f"
            echo "Patched: $f"
          done
          if grep -rq '/__w/velox/velox' "$CUDF_DIR/tests" --include=CTestTestfile.cmake; then
            echo "Error: Some CTestTestfile.cmake files still reference /__w/velox/velox after patching:"
            grep -rl '/__w/velox/velox' "$CUDF_DIR/tests" --include=CTestTestfile.cmake
            exit 1
          fi
          grep -h "Source directory" "${ctest_files[@]}" || true
          grep -h "Build directory" "${ctest_files[@]}" || true
          (cd  $CUDF_DIR && tar -xf cudf-libs.tar)
          # Patch test executables.
          # ldfconfig causes system wide changes. Since we are copying some system libraries from
          # the build machine, we need to use patchelf to add the copied libraries path only to
          # the test executables.
          for exe in $CUDF_DIR/tests/velox_cudf_*; do
            patchelf --force-rpath --set-rpath '$ORIGIN/../cudf-libs' "$exe"
            chmod +x "$exe"
            ls -l "$exe"
          done

      - name: Run cuDF Tests
        run: |
          cd $CUDF_DIR/tests/
          ctest --output-on-failure

  ubuntu-debug:
    runs-on: 32-core-ubuntu
    container: ghcr.io/facebookincubator/velox-dev:ubuntu-22.04
    # Full-mode only — selective coverage pre-approval comes from the
    # adapters job. Ubuntu debug is part of the post-approval / on-push
    # full-coverage suite (catches debug-only assertions and validates
    # against system Ubuntu deps).
    #
    # CONTRACT: the job display name below ("Ubuntu debug with system
    # dependencies") is matched by .github/actions/rerun-linux-build/
    # action.yml's `find_run` step via the regex
    # `^Build with GCC / Ubuntu debug` to detect whether an existing
    # Linux Build run is already in full mode (skipped → selective;
    # anything else → full). If you rename this job, update that regex
    # — otherwise the rerun-skip optimization will silently break and
    # the action will fall back to "always rerun", wasting CI minutes
    # on duplicate full builds triggered by approvals / /full-build
    # comments on PRs whose builds are already in full mode.
    if: ${{ inputs.is-full-mode && github.repository == 'facebookincubator/velox' }}
    name: Ubuntu debug with system dependencies
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      USE_CLANG: ${{ inputs.use-clang && 'true' || 'false' }}
    outputs:
      build-outcome: ${{ steps.build.outcome }}
      build-failure-details: ${{ steps.build-errors.outputs.build-failure-details }}
      test-outcome: ${{ steps.retry-tests.outcome != 'skipped' && steps.retry-tests.outcome || steps.tests.outcome }}
      flaky: ${{ steps.retry-tests.outputs.flaky }}
      failed-tests: ${{ steps.retry-tests.outputs.failed-tests }}
      failed-cases: ${{ steps.retry-tests.outputs.failed-cases }}
      failure-details: ${{ steps.retry-tests.outputs.failure-details }}
    defaults:
      run:
        shell: bash
        working-directory: velox
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
          path: velox
          persist-credentials: false

      - name: Fix git permissions
        # Usually actions/checkout does this but as we run in a container
        # it doesn't work
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Install Dependencies
        env:
          VELOX_BUILD_SHARED: "ON"
        run: |
          if git diff --name-only HEAD^1 HEAD | grep -q "scripts/setup-"; then
            # Overwrite old setup scripts with changed versions
            cp scripts/setup-* /

            mkdir /tmp/build
            cd /tmp/build

            export VELOX_ARROW_CMAKE_PATCH="${GITHUB_WORKSPACE}/velox/CMake/resolve_dependency_modules/arrow/arrow-testing-boost.patch ${GITHUB_WORKSPACE}/velox/CMake/resolve_dependency_modules/arrow/cmake-compatibility.patch"
            USE_CLANG=false bash /setup-ubuntu.sh

            cd /
            rm -rf /tmp/build # cleanup to avoid issues with disk space
          fi

      - name: Get Ccache Stash
        uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-debug-default-${{ inputs.use-clang && 'clang' || 'gcc' }}

      - name: Ensure Stash Dirs Exists
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$CCACHE_DIR"

      - uses: actions/checkout@v5
        with:
          path: velox
          persist-credentials: false

      - name: Install Dependencies
        run: |
          source scripts/setup-ubuntu.sh
          install_apt_deps
          install_faiss_deps
          # We can remove them once we bundle FBThrift.
          install_fmt
          install_boost
          install_fast_float
          install_folly
          install_fizz
          install_wangle
          install_mvfst
          install_fbthrift

      - name: Clear CCache Statistics
        run: |
          ccache -sz

      - name: Make Debug Build
        id: build
        env:
          VELOX_DEPENDENCY_SOURCE: SYSTEM
          ICU_SOURCE: SYSTEM
          # Mirror the adapters and fedora-debug jobs: build FAISS from
          # source instead of resolving the system-installed package.
          # The system FAISS config (/usr/local/share/faiss/faiss-config.cmake)
          # sets the link interface of the imported `faiss` target to
          # include OpenMP::OpenMP_CXX without ever calling
          # find_package(OpenMP) to define it, so a SYSTEM resolution
          # fails the configure.
          faiss_SOURCE: BUNDLED
          # Use BUNDLED gflags to provide PIC static gflags for .so plugins.
          # The container's folly is built with -DGFLAGS_SHARED=FALSE so its
          # exported config references gflags_static which BUNDLED gflags provides.
          gflags_SOURCE: BUNDLED
          # Keep system glog (container's glog is built against the same gflags
          # version). Without this, BUNDLED gflags cascades to BUNDLED glog
          # which conflicts with system glog loaded transitively.
          glog_SOURCE: SYSTEM
          MAKEFLAGS: NUM_THREADS=32 MAX_HIGH_MEM_JOBS=8 MAX_LINK_JOBS=6
        run: |
          # The container ships CMake 3.30.4. Bump to 3.31.1 so
          # CMAKE_LINK_LIBRARIES_STRATEGY=REORDER_FREELY (added in 3.31)
          # actually takes effect — without it ld --as-needed drops
          # libxxhash.so before libthriftmetadata.a needs XXH3_64bits,
          # breaking the velox_functions_remote_client_test link.
          uv tool install --force cmake@3.31.1
          # Shared per-profile flag lists live in
          # .github/scripts/cmake-flags.sh — script handles
          # Clang-conditional flags internally via USE_CLANG.
          BUILD_PROFILE=ubuntu-debug USE_CLANG="${USE_CLANG}" source .github/scripts/cmake-flags.sh
          if [[ "${USE_CLANG}" = "true" ]]; then
             export CC=/usr/bin/clang-15; export CXX=/usr/bin/clang++-15;
          fi
          export EXTRA_CMAKE_FLAGS="${CMAKE_FLAGS[*]}"
          make debug 2>&1 | tee /tmp/build-output.log

      - name: Extract build errors
        id: build-errors
        if: failure() && steps.build.outcome == 'failure'
        run: |
          # Strip ANSI escape sequences before grepping — the build uses
          # -fdiagnostics-color=always which embeds SGR and erase (ESC[K)
          # codes that prevent matching literal ': error:'.
          BUILD_ERRORS=$(sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/build-output.log | grep -E ' (error|fatal error):' | head -50 || true)
          if [[ -n $BUILD_ERRORS ]]; then
            {
              echo 'build-failure-details<<EOF'
              echo "$BUILD_ERRORS"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: CCache after
        run: |
          ccache -vs

      - uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ubuntu-debug-default-${{ inputs.use-clang && 'clang' || 'gcc' }}

      - name: Run Tests
        id: tests
        continue-on-error: true
        if: steps.build.outcome == 'success'
        run: |
          ulimit -n 65536
          cd _build/debug
          ctest -j 24 --timeout 1800 --output-on-failure --no-tests=error \
            --output-junit test-results.xml 2>&1 | tee /tmp/ctest-output.log

      - name: Retry Flaky Tests
        id: retry-tests
        continue-on-error: true
        if: steps.tests.outcome == 'failure'
        run: |
          cd _build/debug
          echo "::warning::Some tests failed. Retrying failed tests..."
          if ctest --rerun-failed -j 4 --timeout 1800 \
               --output-on-failure --output-junit retry-results.xml; then
            echo "::warning::All failed tests passed on retry — these are flaky tests."
            echo "flaky=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Tests failed consistently on retry."
            "$GITHUB_WORKSPACE/velox/.github/scripts/extract-test-failures.sh" /tmp/ctest-output.log
            exit 1
          fi

  ubuntu-debug-build-status:
    # Skip when ubuntu-debug is skipped (selective mode) — otherwise
    # this would post a misleading "passed" status for a job that
    # didn't run.
    if: ${{ inputs.is-full-mode && always() }}
    needs: ubuntu-debug
    runs-on: ubuntu-latest
    name: "BUILD: Ubuntu debug with system dependencies"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Report build status
        run: .github/scripts/report-build-status.sh "Ubuntu debug with system dependencies"
        env:
          BUILD_OUTCOME: ${{ needs.ubuntu-debug.outputs.build-outcome }}
          BUILD_FAILURE_DETAILS: ${{ needs.ubuntu-debug.outputs.build-failure-details }}

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-ubuntu-debug-build
          path: /tmp/ci-failure/failure.json
          retention-days: 1
          if-no-files-found: ignore

  ubuntu-debug-test-status:
    if: ${{ inputs.is-full-mode && always() }}
    needs: ubuntu-debug
    runs-on: ubuntu-latest
    name: "TEST: Ubuntu debug with system dependencies"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Report test status
        run: .github/scripts/report-test-status.sh "Ubuntu debug with system dependencies" "Ubuntu debug"
        env:
          BUILD_OUTCOME: ${{ needs.ubuntu-debug.outputs.build-outcome }}
          TEST_OUTCOME: ${{ needs.ubuntu-debug.outputs.test-outcome }}
          FLAKY: ${{ needs.ubuntu-debug.outputs.flaky }}
          FAILED_TESTS: ${{ needs.ubuntu-debug.outputs.failed-tests }}
          FAILED_CASES: ${{ needs.ubuntu-debug.outputs.failed-cases }}
          FAILURE_DETAILS: ${{ needs.ubuntu-debug.outputs.failure-details }}

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-ubuntu-debug-test
          path: /tmp/ci-failure/failure.json
          retention-days: 1
          if-no-files-found: ignore

  fedora-debug:
    runs-on: 32-core-ubuntu
    container: ghcr.io/facebookincubator/velox-dev:fedora
    # Gated on is-full-mode so this build-only job runs only after the PR
    # is approved (or on push to main).
    if: ${{ inputs.is-full-mode && github.repository == 'facebookincubator/velox' }}
    name: Fedora debug
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
    outputs:
      build-outcome: ${{ steps.build.outcome }}
    defaults:
      run:
        shell: bash
        working-directory: velox
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
          path: velox
          persist-credentials: false

      - name: Fix git permissions
        # Usually actions/checkout does this but as we run in a container
        # it doesn't work
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Install Dependencies
        env:
          VELOX_BUILD_SHARED: "ON"
        run: |
          if git diff --name-only HEAD^1 HEAD | grep -q "scripts/setup-"; then
            # Overwrite old setup scripts with changed versions
            cp scripts/setup-* /

            mkdir /tmp/build
            cd /tmp/build

            # Use absolute path within the container for patches
            export VELOX_ARROW_CMAKE_PATCH="${GITHUB_WORKSPACE}/velox/CMake/resolve_dependency_modules/arrow/arrow-testing-boost.patch ${GITHUB_WORKSPACE}/velox/CMake/resolve_dependency_modules/arrow/cmake-compatibility.patch"
            # Install basic deps with GCC. Some deps have problems (e.g. folly missing atomic lib).
            USE_CLANG=false bash /setup-fedora.sh

            cd /
            rm -rf /tmp/build # cleanup to avoid issues with disk space
          fi

      - name: Get Ccache Stash
        uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-fedora-debug-default-gcc

      - name: Ensure Stash Dirs Exists
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$CCACHE_DIR"

      - name: Clear CCache Statistics
        run: |
          ccache -sz

      - name: Make Debug Build
        id: build
        env:
          VELOX_DEPENDENCY_SOURCE: SYSTEM
          faiss_SOURCE: BUNDLED
          simdjson_SOURCE: BUNDLED
          gRPC_SOURCE: SYSTEM
          MAKEFLAGS: NUM_THREADS=32 MAX_HIGH_MEM_JOBS=8 MAX_LINK_JOBS=6
        run: |
          uv tool install --force cmake@3.31.1
          dnf install -y -q --setopt=install_weak_deps=False grpc-devel grpc-plugins
          # Shared per-profile flag lists live in
          # .github/scripts/cmake-flags.sh.
          BUILD_PROFILE=fedora-debug source .github/scripts/cmake-flags.sh
          export EXTRA_CMAKE_FLAGS="${CMAKE_FLAGS[*]}"
          make debug

      - name: CCache after
        run: |
          ccache -vs

      - uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-fedora-debug-default-gcc

  fedora-debug-build-status:
    if: ${{ inputs.is-full-mode && always() }}
    needs: fedora-debug
    runs-on: ubuntu-latest
    name: "BUILD: Fedora debug"
    steps:
      - run: |
          if [[ -z "$BUILD_OUTCOME" || "$BUILD_OUTCOME" == "cancelled" ]]; then
            echo "Build was cancelled (likely superseded by a newer push). Skipping."
            exit 0
          fi
          if [[ "$BUILD_OUTCOME" != "success" ]]; then
            echo "::error::Fedora debug build failed. Do not land this PR until the build is fixed."
            exit 1
          fi
          echo "Build succeeded."
        env:
          BUILD_OUTCOME: ${{ needs.fedora-debug.outputs.build-outcome }}

      - name: Upload build failure artifact
        if: failure()
        run: |
          mkdir -p /tmp/ci-failure
          jq -n --arg job "Fedora debug" --arg type "build" \
            '{job: $job, type: $type}' \
            > /tmp/ci-failure/failure.json

      - name: Upload failure comment artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-fedora-build
          path: /tmp/ci-failure/failure.json
          retention-days: 1

  asan-ubsan-adapters:
    name: Linux ASAN/UBSAN with system dependencies
    # Full-mode only — selective coverage pre-approval comes from the
    # adapters job. Like ubuntu-debug / fedora-debug, the sanitizer
    # build is part of the post-approval / on-push full-coverage suite
    # (catches memory and UB issues that the release build masks). The
    # repo check prevents errors when forks fast-forward their main
    # branch.
    if: ${{ inputs.is-full-mode && github.repository == 'facebookincubator/velox' }}
    runs-on: 32-core-ubuntu
    container:
      image: ghcr.io/czentgr/czentgr-test:thrift-deps
      volumes:
        - /usr:/host_usr
        - /opt:/host_opt
    defaults:
      run:
        shell: bash
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      VELOX_DEPENDENCY_SOURCE: SYSTEM
      faiss_SOURCE: BUNDLED
    outputs:
      build-outcome: ${{ steps.build.outcome }}
      build-failure-details: ${{ steps.build-errors.outputs.build-failure-details }}
      test-outcome: ${{ steps.tests.outcome }}
      flaky: ${{ steps.tests.outputs.flaky }}
      failed-tests: ${{ steps.tests.outputs.failed-tests }}
      failed-cases: ${{ steps.tests.outputs.failed-cases }}
      failure-details: ${{ steps.tests.outputs.failure-details }}
    concurrency:
      group: ${{ github.workflow }}-asan-ubsan-adapters-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Free Disk Space
        run: |
          # Re-used from free-disk-space github action.
          getAvailableSpace() { echo $(df -a $1 | awk 'NR > 1 {avail+=$4} END {print avail}'); }
          # Show before
          echo "Original available disk space: " $(getAvailableSpace)
          # Remove DotNet.
          rm -rf /host_usr/share/dotnet || true
          # Remove android
          rm -rf /host_usr/local/lib/android || true
          # Remove CodeQL
          rm -rf /host_opt/hostedtoolcache/CodeQL || true
          # Show after
          echo "New available disk space: " $(getAvailableSpace)

      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Fix git permissions
        # Usually actions/checkout does this but as we run in a container
        # it doesn't work
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-asan-ubsan-adapters

      - name: Zero Ccache Statistics
        run: |
          ccache -sz

      - name: Make Asan/Ubsan Build (debug plus -O1)
        id: build
        env:
          MAKEFLAGS: NUM_THREADS=24 MAX_HIGH_MEM_JOBS=8 MAX_LINK_JOBS=14
        run: |
          # VELOX_ENABLE_REMOTE_FUNCTIONS is turned off due producing a SEGV if the shared library is used.
          # Revist once PR 16019 lands that removes thrift.
          EXTRA_CMAKE_FLAGS=(
            "-DVELOX_ENABLE_ASAN_UBSAN_SANITIZERS=ON"
            "-DVELOX_ENABLE_BENCHMARKS=ON"
            "-DVELOX_ENABLE_EXAMPLES=ON"
            "-DVELOX_ENABLE_ARROW=ON"
            "-DVELOX_ENABLE_GEO=ON"
            "-DVELOX_ENABLE_PARQUET=ON"
            "-DVELOX_ENABLE_HDFS=ON"
            "-DVELOX_ENABLE_S3=ON"
            "-DVELOX_ENABLE_GCS=ON"
            "-DVELOX_ENABLE_ABFS=ON"
            "-DVELOX_BUILD_SHARED=ON"
            "-DVELOX_ENABLE_REMOTE_FUNCTIONS=OFF"
          )
          clang++ --version
          CC=clang CXX=clang++ EXTRA_CMAKE_FLAGS="${EXTRA_CMAKE_FLAGS[*]}" make debug

      - name: Extract build errors
        id: build-errors
        if: failure() && steps.build.outcome == 'failure'
        run: |
          BUILD_ERRORS=$(grep -E '^.*:(error|fatal error):' /tmp/build-output.log | head -50 || true)
          if [[ -n $BUILD_ERRORS ]]; then
            {
              echo 'build-failure-details<<EOF'
              echo "$BUILD_ERRORS"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Ccache after
        run: ccache -s

      - uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-asan-ubsan-adapters

      - name: Run Tests
        id: tests
        continue-on-error: true
        if: steps.build.outcome == 'success'
        env:
          LIBHDFS3_CONF: ${{ github.workspace }}/scripts/ci/hdfs-client.xml
          LSAN_OPTIONS: detect_leaks=0
        working-directory: _build/debug
        run: |
          source /setup-classpath.sh
          ulimit -n 65536
          if ctest -j 24 --timeout 1800 --output-on-failure --no-tests=error \
               --output-junit test-results.xml 2>&1 | tee /tmp/ctest-output.log; then
            echo "All tests passed on first run."
          else
            echo "::warning::Some tests failed. Retrying failed tests..."
            if ctest --rerun-failed -j 4 --timeout 1800 \
                 --output-on-failure --output-junit retry-results.xml; then
              echo "::warning::All failed tests passed on retry — these are flaky tests."
              echo "flaky=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tests failed consistently on retry."
              "$GITHUB_WORKSPACE/velox/.github/scripts/extract-test-failures.sh" /tmp/ctest-output.log
              exit 1
            fi
          fi

  asan-ubsan-build-status:
    if: ${{ inputs.is-full-mode && always() }}
    needs: asan-ubsan-adapters
    runs-on: ubuntu-latest
    name: "BUILD: Linux sanitizers with system dependencies"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Report build status
        run: .github/scripts/report-build-status.sh "Linux ASAN/UBSAN with system dependencies"
        env:
          BUILD_OUTCOME: ${{ needs.asan-ubsan-adapters.outputs.build-outcome }}
          BUILD_FAILURE_DETAILS: ${{ needs.asan-ubsan-adapters.outputs.build-failure-details }}

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-asan-ubsan-adapters-build
          path: /tmp/ci-failure/failure.json
          retention-days: 1
          if-no-files-found: ignore

  asan-ubsan-test-status:
    if: ${{ inputs.is-full-mode && always() }}
    needs: asan-ubsan-adapters
    runs-on: ubuntu-latest
    name: "TEST: Linux sanitizers with system dependencies"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Report test status
        run: .github/scripts/report-test-status.sh "Linux ASAN/UBSAN with system dependencies" "CentOS release with -O1"
        env:
          BUILD_OUTCOME: ${{ needs.asan-ubsan-adapters.outputs.build-outcome }}
          TEST_OUTCOME: ${{ needs.asan-ubsan-adapters.outputs.test-outcome }}
          FLAKY: ${{ needs.asan-ubsan-adapters.outputs.flaky }}
          FAILED_TESTS: ${{ needs.asan-ubsan-adapters.outputs.failed-tests }}
          FAILED_CASES: ${{ needs.asan-ubsan-adapters.outputs.failed-cases }}
          FAILURE_DETAILS: ${{ needs.asan-ubsan-adapters.outputs.failure-details }}

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-asan-ubsan-adapters-test
          path: /tmp/ci-failure/failure.json
          retention-days: 1
          if-no-files-found: ignore
