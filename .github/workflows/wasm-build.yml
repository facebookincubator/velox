name: WASM Build

on:
  push:
    branches:
      - main
    paths:
      - velox/**
      - '!velox/docs/**'
      - CMakeLists.txt
      - CMake/**
      - .github/workflows/wasm-build.yml

  pull_request:
    paths:
      - velox/**
      - '!velox/docs/**'
      - CMakeLists.txt
      - CMake/**
      - .github/workflows/wasm-build.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  wasm:
    name: Build for WebAssembly
    runs-on: 16-core-ubuntu
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14 # zizmor: ignore[unpinned-uses] Third-party emsdk setup action; tracked via tag.
        with:
          version: 3.1.64

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache

      - uses: apache/infrastructure-actions/stash/restore@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-wasm

      - name: Zero Ccache Statistics
        run: ccache -sz

      - name: Configure
        run: |
          emcmake cmake -B _build/wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DVELOX_DEPENDENCY_SOURCE=BUNDLED \
            -GNinja

      - name: Build
        run: cmake --build _build/wasm -j $(nproc)

      - name: Ccache Statistics
        run: ccache -s

      - uses: apache/infrastructure-actions/stash/save@3354c1565d4b0e335b78a76aedd82153a9e144d4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-wasm
